<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    width:1200px;height:630px;overflow:hidden;
    background:#0C1B2E;
    font-family:Arial,Helvetica,sans-serif;
    position:relative;
  }

  /* Subtle gradient overlay */
  .bg{
    position:absolute;inset:0;
    background:linear-gradient(135deg,#0C1B2E 0%,#0A1520 60%,#061018 100%);
  }

  /* Gold left border */
  .left-bar{
    position:absolute;left:0;top:0;width:7px;height:630px;
    background:#C9A84C;
  }

  /* Dot grid background (right side) */
  .grid{
    position:absolute;right:0;top:0;width:540px;height:630px;
    background-image:radial-gradient(circle, rgba(201,168,76,.18) 1px, transparent 1px);
    background-size:32px 32px;
    background-position:16px 16px;
  }

  /* Right side fade */
  .grid::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(to right,#0C1B2E 0%,transparent 30%,transparent 70%,#061018 100%);
  }

  /* Logo mark — ring + x */
  .logomark{
    position:absolute;left:92px;top:50%;transform:translateY(-50%);
    width:180px;height:180px;
  }
  .logomark svg{width:180px;height:180px}

  /* Content */
  .content{
    position:absolute;left:320px;top:50%;transform:translateY(-50%);
    width:620px;
  }

  .tag{
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    color:#C9A84C;font-weight:600;margin-bottom:20px;
    font-family:'DM Mono',monospace;
  }

  h1{
    font-size:56px;font-weight:800;line-height:1.05;
    color:#fff;margin-bottom:20px;
    letter-spacing:-.02em;
  }

  h1 span{color:#C9A84C}

  .sub{
    font-size:20px;color:rgba(255,255,255,.55);
    line-height:1.45;font-weight:400;
    max-width:520px;
  }

  /* Bottom strip */
  .bottom{
    position:absolute;bottom:0;left:0;right:0;height:4px;
    background:linear-gradient(to right,#C9A84C,rgba(201,168,76,0));
  }

  /* xelo wordmark top-right */
  .wordmark{
    position:absolute;top:40px;right:52px;
    font-size:22px;font-weight:700;letter-spacing:.04em;
    color:rgba(201,168,76,.5);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="left-bar"></div>
  <div class="bottom"></div>

  <div class="wordmark">xelo</div>

  <div class="logomark">
    <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
      <circle cx="90" cy="90" r="74" fill="none" stroke="#C9A84C" stroke-width="3.5"/>
      <line x1="58" y1="58" x2="122" y2="122" stroke="#C9A84C" stroke-width="9" stroke-linecap="round"/>
      <line x1="122" y1="58" x2="58" y2="122" stroke="#C9A84C" stroke-width="9" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="content">
    <div class="tag">For Real Estate Agents</div>
    <h1>AI property videos,<br><span>fully automatic.</span></h1>
    <div class="sub">Upload photos. Add an address. Get a cinematic listing video — ready to share on every portal.</div>
  </div>
</body>
</html>
